name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check syntax of changed Python files
        run: |
          CHANGED_PY=$(git diff --name-only HEAD~1..HEAD -- '*.py' 2>/dev/null || true)
          if [ -n "$CHANGED_PY" ]; then
            echo "Checking: $CHANGED_PY"
            FAIL=0
            for f in $CHANGED_PY; do
              [ -f "$f" ] && python -m py_compile "$f" || FAIL=1
            done
            [ $FAIL -ne 0 ] && exit 1
            echo "All syntax checks passed"
          else
            echo "No Python files changed"
          fi

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          pip install -r requirements.txt || true

      - name: Run unit tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/unit/ -q --tb=short \
            --ignore=tests/unit/test_impact_jobs.py \
            --cov=backend --cov=workflow --cov=report_gen --cov=generators \
            --cov-report=term-missing --cov-report=html:htmlcov \
            --cov-fail-under=40

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend-v2
        run: npm ci

      - name: Run Vitest
        working-directory: frontend-v2
        run: npm test
